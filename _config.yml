# Site settings
course_name: Artificial Intelligence for Cyber Security
course_description: "Course materials, lectures, assignments, schedule, and announcements for Artificial Intelligence for Cyber Security (AI4Sec)."
course_semester: "Spring 2026"

baseurl: "/Ai4Sec" # the subpath of your site, e.g. /blog/
url: "https://atlaslab-ai.github.io" # the base hostname & protocol for your site

schoolname: "Analysis and Design of Secure Systems Lab"
schoolurl: "https://atlas.aut.ac.ir"
twitter_username:  

address: |
    Artificial Intelligence for Cyber Security
    Course Website
# Set your Google Analytics tracking ID (set up yours at http://www.google.com/analytics/)
# google_analytics: UA-XXXXXXXX-X

### Do not change the followings unless you know what you are doing ###

# Build settings
markdown: kramdown

# Other options
permalink: blog/:year/:month/:title
excerpt_separator: "<!--more-->"

include: ['_images', '_css']
exclude: ['develop']

dateformat: "%m/%d/%Y"

future: true
collections:
    events:
        output: true
    lectures:
        output: true
    assignments:
        output: true
    announcements:
        output: false


defaults:
  - scope:
      path: ""
      type: "assignments"
    values:
      layout: "assignment"
